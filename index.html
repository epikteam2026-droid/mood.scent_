            </div>

        </div>
    </a>

    <a href="/mood-scent/category/perfume.html" class="category-link">

  <script>
  const links = document.querySelectorAll('.nav a');

  links.forEach(link => {
    link.addEventListener('click', function () {

      // 전체 active 제거
      links.forEach(l => l.classList.remove('active'));

      // 클릭한 메뉴 활성화
      this.classList.add('active');

      // 🔥 BEATY 하위 클릭 시 부모도 강조
      if (this.closest('.dropdown-menu')) {
        document.querySelector('.nav-dropdown > a').classList.add('active');
      }
    });
  });
</script>

</body>
