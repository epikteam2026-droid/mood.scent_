<script>

// ================= NAV ACTIVE =================
const links = document.querySelectorAll('.nav a');
const currentPath = window.location.pathname;

links.forEach(link => {
  const linkPath = link.getAttribute('href');

  if (linkPath !== "#" && currentPath.includes(linkPath)) {
    link.classList.add('active');
  }

  if (currentPath.includes('/beaty/')) {
    if (link.textContent.includes('BEATY')) {
      link.classList.add('active');
    }
  }
});


// ================= PRICE CALC =================
document.querySelectorAll('.priceWrap').forEach(el => {
  const original = parseInt(el.dataset.original);
  const sale = parseInt(el.dataset.sale);

  if (!original || !sale) return;

  const percent = Math.round(((original - sale) / original) * 100);

  el.querySelector('.sale-price').textContent = sale.toLocaleString() + "원";
  el.querySelector('.percent').textContent = percent + "%";
  el.querySelector('.original-price').textContent = original.toLocaleString() + "원";
});


// ================= PAGINATION + SEARCH FIX =================

const cards = Array.from(document.querySelectorAll('.product-card'));
const paginationEl = document.querySelector('.pagination');
const searchInput = document.getElementById('productSearch');

const itemsPerPage = 35;

let currentPage = 1;
let filteredCards = [...cards];


// ================= NORMALIZE =================
function normalize(str = "") {
  return str
    .toLowerCase()
    .replace(/\s/g, "")
    .replace(/[^a-z0-9가-힣]/g, "");
}


// ================= RENDER CARDS =================
function renderCards() {
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;

  cards.forEach(card => {
    card.style.display = "none";
  });

  filteredCards.forEach((card, index) => {
    if (index >= start && index < end) {
      card.style.display = "block";
    }
  });
}


// ================= PAGINATION RENDER =================
function renderPagination() {
  paginationEl.innerHTML = "";

  const totalPages = Math.ceil(filteredCards.length / itemsPerPage);

  if (totalPages <= 1) return;

  const maxShow = 5;

  let startPage = Math.max(1, currentPage - Math.floor(maxShow / 2));
  let endPage = startPage + maxShow - 1;

  if (endPage > totalPages) {
    endPage = totalPages;
    startPage = Math.max(1, endPage - maxShow + 1);
  }

  // prev
  if (currentPage > 1) {
    paginationEl.appendChild(createBtn("‹", currentPage - 1));
  }

  // numbers
  for (let i = startPage; i <= endPage; i++) {
    const btn = createBtn(i, i);
    if (i === currentPage) btn.classList.add("active");
    paginationEl.appendChild(btn);
  }

  // next
  if (currentPage < totalPages) {
    paginationEl.appendChild(createBtn("›", currentPage + 1));
  }
}


// ================= BUTTON =================
function createBtn(text, page) {
  const btn = document.createElement("button");
  btn.textContent = text;

  btn.addEventListener("click", () => {
    currentPage = page;
    update();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  return btn;
}


// ================= UPDATE =================
function update() {
  renderCards();
  renderPagination();
}


// ================= SEARCH =================
searchInput?.addEventListener('input', (e) => {
  const value = normalize(e.target.value);

  filteredCards = cards.filter(card => {
    return normalize(card.innerText).includes(value);
  });

  currentPage = 1;
  update();
});


// ================= INIT =================
update();

</script>
